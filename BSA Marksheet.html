async function loadBSAMARKSheet(){

let url=`https://sheets.googleapis.com/v4/spreadsheets/${sheetBSAMARKId}/values/INDEX!A:AW?key=${apiBSAMARKKey}`;

let res=await fetch(url);

let data=await res.json();

sheetBSAMARKData=data.values;

}



function updateAdmission(){

let cls=document.getElementById("class").value;
let session=document.getElementById("session").value;

let admission=document.getElementById("admission");

admission.innerHTML="<option>Select Admission No</option>";

let count=0;

for(let i=1;i<sheetBSAMARKData.length;i++){

let row=sheetBSAMARKData[i];

if(row[1]==cls && row[39]==session){

let op=document.createElement("option");

op.value=row[0];
op.text=row[0];

admission.appendChild(op);

count++;

}

}

document.getElementById("studentCount").innerHTML="Total Students : "+count;

showTopStudents();
showPositionTable();

}

function showTopStudents(){

let cls=document.getElementById("class").value;
let session=document.getElementById("session").value;

if(!cls || !session) return;

let subjects=classSubjects[cls];

let students=[];

for(let i=1;i<sheetBSAMARKData.length;i++){

let row=sheetBSAMARKData[i];

if(row[1]==cls && row[39]==session){

let total=0;

subjects.forEach(sub=>{

let idx=subjectIndex[sub];
if(!idx) return;

idx.forEach(i=>{
total+=parseInt(row[i])||0;
});

});

students.push({name:row[2],adm:row[0],total:total});

}

}

students.sort((a,b)=>b.total-a.total);

let text="";

students.slice(0,5).forEach((s,i)=>{

let pos=["1st","2nd","3rd","4th","5th"][i];

// position colors
let colors=["green","blue","red","gray","#00C49E"];

text+=`<span style="color:${colors[i]}; font-weight:bold;">
${pos}: ${s.name} (A.No: ${s.adm}) (Total Marks: ${s.total})
</span> | `;

});

document.getElementById("top5students").innerHTML=text;

}

function showPositionTable(){

let cls=document.getElementById("class").value;
let session=document.getElementById("session").value;

if(!cls || !session) return;

let subjects=classSubjects[cls];

let students=[];

for(let i=1;i<sheetBSAMARKData.length;i++){

let row=sheetBSAMARKData[i];

if(row[1]==cls && row[39]==session){

let total=0;

subjects.forEach(sub=>{
let idx=subjectIndex[sub];
if(!idx) return;

idx.forEach(i=>{
total+=parseInt(row[i])||0;
});
});

students.push({
adm:row[0],
name:row[2],
father:row[3],
mother:row[4],
dob:row[5],
roll:row[6],
total:total
});

}
}

students.sort((a,b)=>b.total-a.total);

let html=`
<table>
<tr>
<th>Position</th>
<th>Admission No</th>
<th>Student Name</th>
<th>Father Name</th>
<th>Mother Name</th>
<th>Date Birth</th>
<th>Roll No</th>
</tr>
`;

students.forEach((s,i)=>{

let pos=i+1;

html+=`
<tr>
<td>${pos}</td>

<td>
<a href="javascript:void(0)" onclick="openMarksheet('${s.adm}')">
${s.adm}
</a>
</td>

<td>${s.name}</td>
<td>${s.father}</td>
<td>${s.mother}</td>
<td>${s.dob}</td>
<td>${s.roll}</td>

</tr>
`;

});

html+="</table>";

document.getElementById("positionTableBox").innerHTML=html;

}


//-----------------------------------------------------------------

function openMarksheet(adm){

document.getElementById("admission").value=adm;

showMarksheet();

document.getElementById("popupMarksheet").innerHTML=
document.getElementById("marksheet").innerHTML;

document.getElementById("marksheetPopup").style.display="block";

}

function closeBSAMARKPopup(){

document.getElementById("marksheetPopup").style.display="none";

}

function printPositionTable() {

let session = document.getElementById("session");
let className = document.getElementById("class");

let sessionText = session.options[session.selectedIndex].text;
let classText = className.options[className.selectedIndex].text;

let tableData = document.getElementById("positionTableBox").outerHTML;

/* ===== Timestamp Format ===== */
let now = new Date();

let day = now.getDate();
let year = now.getFullYear();

let months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let month = months[now.getMonth()];

let hours = now.getHours();
let minutes = now.getMinutes().toString().padStart(2,"0");

let ampm = hours >= 12 ? "PM" : "AM";
hours = hours % 12;
hours = hours ? hours : 12;

let timeStamp = `${day}-${month}-${year}/${hours}:${minutes} ${ampm}`;
/* ============================ */

let printWindow = window.open("", "", "width=900,height=700");

printWindow.document.write(`
<html>
<head>
<title>Print</title>

<style>

body{
font-family: Arial;
margin:20px;
}

.header{

}

.left{
font-size:20px;
font-weight:bold;
}

.right{
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table, th, td{
border:1px solid black;
}

th,td{
padding:6px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
<div class="left">Session : ${sessionText} | Class : ${classText}</div>
<div class="right">${timeStamp}</div>
</div>

${tableData}

</body>
</html>
`);

printWindow.document.close();
printWindow.print();

}
